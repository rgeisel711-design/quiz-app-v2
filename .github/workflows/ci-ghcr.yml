name: CI + Docker Image to GHCR

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Code Checks & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

  docker:
    name: Build und Push Docker Images
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare lowercase image namespace
        id: image-vars
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image-vars.outputs.owner_lc }}/quiz-web:${{ steps.image-vars.outputs.short_sha }}
            ghcr.io/${{ steps.image-vars.outputs.owner_lc }}/quiz-web:latest

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          file: services/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image-vars.outputs.owner_lc }}/quiz-api:${{ steps.image-vars.outputs.short_sha }}
            ghcr.io/${{ steps.image-vars.outputs.owner_lc }}/quiz-api:latest